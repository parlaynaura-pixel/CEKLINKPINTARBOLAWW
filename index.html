<body>

<div class="container">
    <h2>PINTARBOLA CEK LINK </h2>
    <textarea id="inputField" placeholder="Masukkan domain"></textarea>
    <input type="button" value="Check Domains" onclick="convertDomains()">
    <input type="button" value="Export URL (Encoded)" onclick="exportData()">
</div>

<script>
  // Utility untuk Base64 encoding/decoding
  function encodeBase64(obj) {
      return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
  }

  function decodeBase64(str) {
      return JSON.parse(decodeURIComponent(escape(atob(str))));
  }

  // Saat halaman dimuat
  window.onload = function() {
      const hash = window.location.hash;
      if (hash.startsWith("#import=")) {
          try {
              const base64Data = hash.replace("#import=", "");
              const data = decodeBase64(base64Data);
              if (data && data.domains) {
                  localStorage.setItem("domainsInput", data.domains);
              }

              const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
              const redirectUrl = isMobile ? "https://kom-kom-kom.blogspot.com/?m=1" : "https://kom-kom-kom.blogspot.com/";
              window.location.href = redirectUrl;
              return;
          } catch (e) {
              alert("Import gagal: data tidak valid.");
              console.error(e);
          }
      }

      // Isi dari localStorage kalau ada
      const stored = localStorage.getItem("domainsInput");
      if (stored) {
          document.getElementById("inputField").value = stored;
      }
  };

  function convertDomains() {
      const input = document.getElementById("inputField").value.trim();
      if (!input) {
          alert("Isi dulu domainnya.");
          return;
      }

      localStorage.setItem("domainsInput", input);

      const domains = input.split('\n')
                           .map(domain => domain.trim())
                           .join('%0D%0A');

      const url = 'https://trustpositif.komdigi.go.id/welcome?domains=' + domains;
      window.open(url, '_blank');
  }

  function exportData() {
      const input = document.getElementById("inputField").value.trim();
      const exportButton = document.querySelector('input[value="Export URL (Encoded)"]');
      
      if (!input) {
          alert("Isi dulu dong.");
          return;
      }
  
      const data = {
          domains: input
      };
  
      const encoded = encodeBase64(data);
      const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
      const baseUrl = isMobile ? "https://kom-kom-kom.blogspot.com/?m=1" : "https://kom-kom-kom.blogspot.com/";
      const fullUrl = baseUrl + "#import=" + encoded;
  
      // Buat copy otomatis ke clipboard
      navigator.clipboard.writeText(fullUrl).then(() => {
          // Ubah tampilan tombol
          exportButton.value = "✅ Berhasil Diexport!";
          exportButton.style.color = "green";
  
          // Balikin lagi setelah 2 detik
          setTimeout(() => {
              exportButton.value = "Export URL (Encoded)";
              exportButton.style.color = "";
          }, 2000);
      }).catch(err => {
          alert("Gagal menyalin URL ke clipboard.");
          console.error(err);
      });
  }
</script>
